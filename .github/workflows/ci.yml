name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  PYTHON_VERSION: "3.13"

jobs:
  backend:
    name: Backend (lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: apps/api/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Ruff lint
        run: ruff check src tests

      - name: Ruff format check
        run: ruff format --check src tests

      - name: Mypy
        run: mypy src
        continue-on-error: true

      - name: Pytest
        env:
          MODELFORGE_API_KEY: ci-test-key
          ENVIRONMENT: development
        run: pytest -q --cov=src --cov-report=term-missing

  frontend:
    name: Frontend (build + e2e smoke)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/frontend/package-lock.json

      - run: npm ci --no-audit --no-fund
      - run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Playwright smoke
        run: npm run test:e2e

  docker:
    name: Docker (build)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: false
          load: true
          tags: modelforge-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: false
          load: true
          tags: modelforge-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Release (push images on tag)
    runs-on: ubuntu-latest
    needs: [docker]
    if: startsWith(github.ref, 'refs/tags/v')
    env:
      IMAGE_OWNER: ${{ github.repository_owner }}
      IMAGE_TAG: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          {
            echo "api<<EOF"
            echo "ghcr.io/${IMAGE_OWNER}/modelforge-api:${IMAGE_TAG}"
            echo "ghcr.io/${IMAGE_OWNER}/modelforge-api:latest"
            echo "EOF"
            echo "frontend<<EOF"
            echo "ghcr.io/${IMAGE_OWNER}/modelforge-frontend:${IMAGE_TAG}"
            echo "ghcr.io/${IMAGE_OWNER}/modelforge-frontend:latest"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.api }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.frontend }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
