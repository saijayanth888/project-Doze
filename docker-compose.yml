# ModelForge — single Compose file for Mac dev (cpu) and DGX Spark (gpu).
#
#   Mac dev:   docker compose up -d
#   DGX Spark: docker compose --profile gpu up -d   # gpu profile = vLLM (+ optional container Ollama)
#
#   Ollama (inference): **No Docker Ollama container is required.** Typical Spark setup runs
#   `ollama serve` via systemd on the host; set `OLLAMA_HOST=http://host.docker.internal:11434`
#   in `.env` so the `api` container reaches host :11434 (`extra_hosts: host-gateway`).
#   The optional `ollama` service below is only for users who want Ollama inside Compose.
#
#   The `api` service uses `runtime: nvidia`, `deploy` GPU reservations, and `ipc: host`
#   on DGX Spark when you need GPU from the API process itself.
#
# n8n uses PostgreSQL (database `n8n`, same credentials as POSTGRES_USER).
# Pass MODELFORGE_API_KEY into the n8n container so HTTP Request nodes can
# call the FastAPI service as `http://api:8000` with header X-API-Key.

services:
  postgres:
    image: ankane/pgvector:latest
    container_name: mf-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-modelforge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-modelforge}
    ports:
      # Host 5433 avoids clashing with a local Postgres on 5432. Inside Compose, use `postgres:5432`.
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-modelforge} -d ${POSTGRES_DB:-modelforge}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: mf-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # n8n is no longer required — all automation is built into the ModelForge API.
  # The in-process AutomationEngine (services/automation.py) handles scheduling,
  # drift detection, health monitoring, Slack notifications, daily/weekly
  # reports, and auto-cleanup natively. Manage everything from /automation
  # in the dashboard.
  #
  # The previous n8n service block + workflow JSON files are kept in
  # `integrations/n8n/workflows/` for reference. To re-enable n8n for custom
  # workflows alongside the built-in engine, uncomment the block below and put
  # the n8n container back into the api service's `depends_on`.
  #
  # n8n:
  #   image: ${N8N_IMAGE:-n8nio/n8n:latest}
  #   container_name: mf-n8n
  #   ports:
  #     - "${N8N_HOST_PORT:-5679}:5678"
  #   environment:
  #     - DB_TYPE=postgresdb
  #     - DB_POSTGRESDB_HOST=postgres
  #     - DB_POSTGRESDB_PORT=5432
  #     - DB_POSTGRESDB_DATABASE=n8n
  #     - DB_POSTGRESDB_USER=${POSTGRES_USER:-modelforge}
  #     - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
  #     - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
  #     - N8N_HOST=0.0.0.0
  #     - N8N_PORT=5678
  #     - N8N_PROTOCOL=http
  #     - N8N_SECURE_COOKIE=${N8N_SECURE_COOKIE:-false}
  #     - WEBHOOK_URL=${N8N_WEBHOOK_URL:-http://localhost:5679/}
  #     - N8N_BASIC_AUTH_ACTIVE=true
  #     - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER:-admin}
  #     - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD}
  #     - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
  #     - MODELFORGE_API_KEY=${MODELFORGE_API_KEY:-}
  #     - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
  #     - N8N_WEBHOOK_SECRET=${N8N_WEBHOOK_SECRET:-}
  #     - EVOLUTION_BASE_MODEL=${EVOLUTION_BASE_MODEL:-llama3.2:3b}
  #     - EVOLUTION_MAX_GENS=${EVOLUTION_MAX_GENS:-10}
  #     - N8N_RESTRICT_ENVIRONMENT_VARIABLES=false
  #   volumes:
  #     - n8n_data:/home/node/.n8n
  #     - ./integrations/n8n/workflows:/import/modelforge-workflows:ro
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   healthcheck:
  #     test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:5678/healthz || exit 1"]
  #     interval: 30s
  #     timeout: 5s
  #     retries: 5
  #     start_period: 40s
  #   restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: modelforge-api:latest
    container_name: mf-api
    env_file: .env
    runtime: nvidia
    ipc: host
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      stack:
        soft: 67108864
        hard: 67108864
    # Cap the API container at 88GB of the 128GB unified DRAM, leaving 33GB
    # for the host OS, desktop session, NVRM driver overhead, and the systemd-
    # Ollama serve process. On DGX Spark a runaway training job can otherwise
    # drag the whole host into OOM territory and freeze the desktop.
    #
    # `memswap_limit: 120g` allows the container to spill 32GB into the host
    # /swap.img before it cgroup-OOMs — this is the safety valve that prevents
    # NVRM's silent host-page exhaustion path (the failure mode behind the
    # 2026-05-07 freeze cascade: NVRM `_memdescAllocInternal` returned
    # NV_ERR_NO_MEMORY 28× in 1s, OOM-killer never fired because NVRM uses
    # non-fatal allocation flags, host froze with wedged GPU contexts).
    #
    # `mem_reservation: 32g` is a soft floor — Docker requests ≥32GB stay
    # reserved for this container under host pressure. `oom_score_adj: 500`
    # makes us slightly more attractive to the host OOM-killer than the
    # desktop session, so a runaway api gets killed before gnome-shell does.
    #
    # `mem_limit` is the standalone-compose form; `deploy.resources.limits`
    # is the spec-compliant form.
    mem_limit: 88g
    memswap_limit: 120g
    mem_reservation: 32g
    oom_score_adj: 500
    deploy:
      resources:
        limits:
          memory: 88G
        reservations:
          memory: 32G
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-modelforge}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-modelforge}
      REDIS_URL: redis://redis:6379
      # Host Ollama: http://host.docker.internal:11434 (requires extra_hosts + Ollama listening on 0.0.0.0).
      # Compose Ollama service: set OLLAMA_HOST=http://ollama:11434 in `.env` and `docker compose --profile gpu up`.
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
      VLLM_HOST: http://vllm:8000
      # Slack webhook used by the in-process AutomationEngine (no n8n needed).
      # Override per-instance from the dashboard at /automation, which writes
      # to the automation_settings table and takes precedence over this env.
      SLACK_WEBHOOK_URL: "${SLACK_WEBHOOK_URL:-}"
      # n8n is no longer required — the API has its own scheduler. These two
      # env vars are kept (commented out) so re-enabling n8n is one uncomment.
      # N8N_WEBHOOK_EVOLUTION_URL: "${N8N_WEBHOOK_EVOLUTION_URL:-http://n8n:5678/webhook/evolution-events}"
      # N8N_WEBHOOK_SECRET: "${N8N_WEBHOOK_SECRET:-}"
      NVIDIA_VISIBLE_DEVICES: all
      # The image's `app` user has no writable HOME (`/home/app` is not created).
      # Point all HF caches at the persistent data volume so model downloads don't
      # fail with PermissionError on first run.
      HF_HOME: /app/data/.cache/huggingface
      HUGGINGFACE_HUB_CACHE: /app/data/.cache/huggingface/hub
      TRANSFORMERS_CACHE: /app/data/.cache/huggingface/hub
      HF_DATASETS_CACHE: /app/data/.cache/huggingface/datasets
      # Xet (HF's chunk-based content-addressable storage backend) settings
      # per huggingface_hub/guides/upload § "Tips and tricks for large uploads".
      # HF_HOME above lives on the bind-mounted ./data volume which can be a
      # network-backed FS on some hosts — chunk hashing/staging hates that.
      # Point the xet cache at the container's local writable layer (overlayfs
      # on host disk) so chunking is fast. HIGH_PERFORMANCE=1 lets hf_xet use
      # every CPU core + all available upload bandwidth; safe here because
      # mf-api has a generous mem_limit (88g) and only one upload runs at a
      # time. Without these the 4 GB adapter upload caps at ~1-2 MB/s and
      # stalls on transient network hiccups; with them, ~5-10× throughput.
      HF_XET_CACHE: /tmp/xet-cache
      HF_XET_HIGH_PERFORMANCE: "1"
      # `expandable_segments` lets the CUDA allocator reuse fragmented blocks instead of
      # crashing the next training run with OOM after a failure has poisoned the pool.
      PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True
      # Required by lm-eval-harness to execute generated code for HumanEval-family
      # tasks. Without this the eval refuses to run and pass@1 stays 0.
      HF_ALLOW_CODE_EVAL: "1"
      # Tokenizers spawns a worker pool by default; in-process training/eval
      # repeatedly forks the process and the pool prints loud `huggingface/tokenizers`
      # warnings while doing nothing useful. Disable it.
      TOKENIZERS_PARALLELISM: "false"
      # Trading-bot database URL — used by BuildTradingDataset.execute() for the
      # SELECT 1 connectivity probe and by modelforge_ingest_decisions.py for the
      # one-shot decisions bootstrap ETL.
      # Port 5434: trading-bot's Postgres is exposed on host:5434 to avoid
      # conflicting with ModelForge's mf-postgres on 5433 (confirmed in
      # trading-bot/docker-compose.yml line 15).
      # host.docker.internal resolves via extra_hosts: host-gateway above.
      TRADEBOT_DATABASE_URL: ${TRADEBOT_DATABASE_URL:-postgresql://postgres:postgres@host.docker.internal:5434/postgres}
    expose:
      - "8000"
    ports:
      # If host :8000 is already in use, set `MODELFORGE_API_HOST_PORT=8001` (or similar) in `.env`.
      - "${MODELFORGE_API_HOST_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      # Bridge to the trading-bot's curated-data path. trading-bot's modelforge_ingest.py
      # + modelforge_curate.py write to /home/saijayanthai/.dgx-train/ on the host;
      # mf-api needs to read from there. Mounted UNDER /app/data so the path-traversal
      # guard in training_backend._resolve_curated_path (which requires curated_path
      # to resolve under settings.resolve_data_root() = /app/data) accepts it.
      - /home/saijayanthai/.dgx-train:/app/data/dgx-train
      # Trading-bot scripts bind-mount: gives the mf-api container access to
      # modelforge_ingest.py + modelforge_curate.py via subprocess calls from
      # BuildTradingDataset.execute(). Read-only: the container never modifies scripts.
      - ~/Documents/trading-bot/scripts:/app/trading-bot/scripts:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/system/status"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # Default empty: browser calls /api on the same host (nginx → api:8000).
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
        VITE_OLLAMA_HOST: ${VITE_OLLAMA_HOST:-http://localhost:11434}
        VITE_VLLM_HOST: ${VITE_VLLM_HOST:-http://localhost:8001}
        VITE_N8N_HOST: ${VITE_N8N_HOST:-http://localhost:5679}
        # Same as MODELFORGE_API_KEY in `.env` — removes 401 spam until user overrides in Settings.
        VITE_MODELFORGE_API_KEY: ${MODELFORGE_API_KEY:-}
    image: modelforge-frontend:latest
    container_name: mf-frontend
    ports:
      # Use 3001 when another dev server already binds host :3000 (e.g. Vite).
      - "${MODELFORGE_WEB_HOST_PORT:-3001}:80"
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ─── Ollama strategy (pick ONE) ──────────────────────────────────────
  #
  # Ollama is REQUIRED for inference (Playground, ForgeAgent, self-distillation
  # teacher in EPT/augment_training). There are two ways to run it:
  #
  # OPTION A — NATIVE OLLAMA on the host (RECOMMENDED for DGX Spark)
  #   On NVIDIA GB10, the host's `ollama serve` (systemd) hits ~130 tok/s.
  #   The same model under Docker drops to ~0.47 tok/s due to GPU passthrough
  #   overhead with unified memory. Big difference for production inference.
  #
  #   To use option A:
  #     1. Run `ollama serve` on the host (or systemd unit).
  #     2. Set in .env:   OLLAMA_HOST=http://host.docker.internal:11434
  #     3. Leave the `ollama:` service block below commented out.
  #
  # OPTION B — DOCKER OLLAMA (slower on GB10, but fully containerised)
  #   To use option B:
  #     1. In .env, set:  OLLAMA_HOST=http://ollama:11434
  #     2. Uncomment the `ollama:` service block below.
  #     3. `docker compose --profile gpu up -d` to start it.
  #
  # Default: OPTION A (host Ollama). The api service points at
  # host.docker.internal via OLLAMA_HOST and `extra_hosts: host-gateway`.
  #
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: mf-ollama
  #   profiles: ["gpu"]
  #   expose:
  #     - "11434"
  #   volumes:
  #     - ollama_models:/root/.ollama
  #   environment:
  #     - OLLAMA_HOST=0.0.0.0
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: all
  #             capabilities: ["gpu"]
  #   restart: unless-stopped

  # ─── vLLM (DISABLED) ────────────────────────────────────────────────
  #
  # vLLM is optional — Ollama handles all inference paths used by the app
  # today (Playground, ForgeAgent, EPT teacher). vLLM is what you'd reach
  # for if you wanted dedicated high-throughput batched serving or PEFT
  # adapters loaded as `lora_request`.
  #
  # Cost on DGX Spark: vLLM holds ~100GB of unified memory while loaded,
  # which crowds out training and the 8-member EPT population. Keep it OFF
  # by default. Uncomment if you specifically need it for serving load.
  #
  # vllm:
  #   image: vllm/vllm-openai:latest
  #   container_name: mf-vllm
  #   profiles: ["gpu"]
  #   expose:
  #     - "8000"
  #   ports:
  #     - "${VLLM_HOST_PORT:-8001}:8000"
  #   command: >
  #     --model ${VLLM_MODEL:-Qwen/Qwen2.5-7B-Instruct}
  #     --dtype auto
  #     --api-key ${VLLM_API_KEY:?VLLM_API_KEY must be set when using the gpu profile}
  #     --max-model-len 8192
  #   environment:
  #     - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
  #   volumes:
  #     - hf_cache:/root/.cache/huggingface
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: all
  #             capabilities: ["gpu"]
  #   restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  # n8n_data is intentionally absent — the n8n service is commented out
  # above and the in-process AutomationEngine is the source of truth for
  # all scheduling, drift detection, Slack notifications, and reports.
  # To re-enable n8n, uncomment both the service block and add the volume
  # back here.
  ollama_models:
  hf_cache:
