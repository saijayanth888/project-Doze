# ModelForge — single Compose file for Mac dev (cpu) and DGX Spark (gpu).
#
#   Mac dev:   docker compose up -d
#   DGX Spark: docker compose --profile gpu up -d
#
# Always-on services: postgres, redis, n8n, api, frontend.
# `gpu` profile additionally starts: ollama, vllm.

services:
  postgres:
    image: ankane/pgvector:latest
    container_name: mf-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-modelforge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-modelforge}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-modelforge} -d ${POSTGRES_DB:-modelforge}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: mf-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  n8n:
    image: n8nio/n8n:latest
    container_name: mf-n8n
    ports:
      - "5678:5678"
    environment:
      - DB_TYPE=sqlite
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD:?N8N_BASIC_AUTH_PASSWORD must be set}
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=${N8N_WEBHOOK_URL:-http://localhost:5678/}
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
    volumes:
      - n8n_data:/home/node/.n8n
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: modelforge-api:latest
    container_name: mf-api
    env_file: .env
    environment:
      # Override the .env defaults so the container resolves the
      # internal Compose hostnames instead of localhost.
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-modelforge}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-modelforge}
      REDIS_URL: redis://redis:6379
      OLLAMA_HOST: http://ollama:11434
      VLLM_HOST: http://vllm:8000
    expose:
      - "8000"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/system/status"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    image: modelforge-frontend:latest
    container_name: mf-frontend
    ports:
      - "3000:80"
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ── GPU-only services (DGX Spark) ────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: mf-ollama
    profiles: ["gpu"]
    expose:
      - "11434"
    volumes:
      - ollama_models:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: ["gpu"]
    restart: unless-stopped

  vllm:
    image: vllm/vllm-openai:latest
    container_name: mf-vllm
    profiles: ["gpu"]
    expose:
      - "8000"
    command: >
      --model meta-llama/Llama-3.1-8B-Instruct
      --dtype auto
      --api-key ${VLLM_API_KEY:?VLLM_API_KEY must be set when using the gpu profile}
      --max-model-len 8192
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
    volumes:
      - hf_cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: ["gpu"]
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  n8n_data:
  ollama_models:
  hf_cache:
